<!DOCTYPE html>
<html lang="ru">
<head>
    <style id="blocker">
        html { display: none !important; background: #000 !important; }
    </style>

    <script>
        (function() {
            if (sessionStorage.getItem('auth_key') !== 'GRANTED_v13') {
                // Если сессии нет, немедленно перенаправляем и убиваем поток отрисовки
                window.location.replace('auth.html');
                document.write('');
                window.stop();
            } else {
                // Если авторизован, убираем блокировку
                document.documentElement.style.display = 'block';
                document.addEventListener("DOMContentLoaded", function() {
                    const styleTag = document.getElementById('blocker');
                    if (styleTag) styleTag.remove();
                });
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDL | Core v1.3 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f4f7f9;
            --card: #ffffff;
            --accent: #0052ff;
            --accent-grad: linear-gradient(180deg, #3a82ff 0%, #0052ff 100%);
            --text: #1c1c1e;
            --border: #e5e5ea;
            --bar-bg: #f2f2f7;
        }

        .dark-theme {
            --bg: #0a0a0c;
            --card: #1c1c1e;
            --accent: #3a82ff;
            --accent-grad: linear-gradient(180deg, #5c9aff 0%, #1a6aff 100%);
            --text: #ffffff;
            --border: #2c2c2e;
            --bar-bg: #2c2c2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        nav { 
            background: rgba(var(--card), 0.8); border-bottom: 1px solid var(--border); 
            display: flex; padding: 0 20px; align-items: center; height: 70px; position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 22px; flex-grow: 1; letter-spacing: -1px; text-shadow: 0 2px 10px rgba(0,82,255,0.2); }
        
        .nav-tools { display: flex; align-items: center; gap: 15px; }

        .icon-btn { 
            background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            width: 42px; height: 42px; border-radius: 12px; background: var(--bar-bg);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        }
        .icon-btn svg { width: 24px; height: 24px; fill: var(--text); }

        .exit-btn { font-size: 11px; font-weight: 800; color: #ff4545; cursor: pointer; text-transform: uppercase; border: 1px solid rgba(255,69,69,0.3); padding: 8px 14px; border-radius: 10px; background: rgba(255,69,69,0.05); }
        .exit-btn:hover { background: #ff4545; color: white; }

        .tab-content { display: flex; flex-direction: column; padding: 20px; gap: 20px; max-width: 1300px; margin: 0 auto; width: 100%; }
        
        @media (min-width: 900px) {
            .tab-content { display: grid; grid-template-columns: 350px 1fr; }
        }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }

        .card { 
            background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        
        h3 { font-size: 11px; font-weight: 900; color: #8e8e93; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 12px; }
        .input-group.full { grid-column: 1 / -1; }
        
        label { font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: 700; outline: none; }
        
        .execute-btn { 
            width: 100%; padding: 18px; border-radius: 14px; background: var(--accent-grad); color: #fff; 
            font-weight: 900; font-size: 14px; border: none; cursor: pointer; text-transform: uppercase; 
            box-shadow: 0 10px 20px rgba(0, 82, 255, 0.3), inset 0 1px 1px rgba(255,255,255,0.4);
        }

        .converter-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .metric { margin-bottom: 16px; }
        .m-info { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; margin-bottom: 8px; }
        .m-bar { height: 10px; background: var(--bar-bg); border-radius: 10px; overflow: hidden; }
        .m-fill { height: 100%; width: 0%; background: var(--accent-grad); border-radius: 10px; transition: 1.2s cubic-bezier(0.2, 1, 0.2, 1); }

        .extra-panel { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; text-align: center; }
        .stat-val { display: block; font-size: 26px; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        .stat-label { font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">MDL CORE v1.3</div>
        <div class="nav-tools">
            <div class="exit-btn" onclick="exit()">Выход</div>
            <button class="icon-btn" onclick="toggleTheme()">
                <svg id="theme-icon" viewBox="0 0 24 24">
                    <path d="M12,3c-4.97,0-9,4.03-9,9s4.03,9,9,9s9-4.03,9-9c0-0.46-0.04-0.92-0.1-1.36c-0.98,1.37-2.58,2.26-4.4,2.26 c-2.98,0-5.4-2.42-5.4-5.4c0-1.81,0.89-3.42,2.26-4.4C12.92,3.04,12.46,3,12,3L12,3z"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="tab-content">
        <div class="sidebar">
            <div class="card">
                <h3>Входные данные</h3>
                <div class="input-grid">
                    <div class="input-group"><label>Темп. (°C)</label><input type="number" id="temp" value="15"></div>
                    <div class="input-group"><label>Точка росы (Td)</label><input type="number" id="dew" value="10"></div>
                    <div class="input-group"><label>Ветер (м/с)</label><input type="number" id="wind" value="5"></div>
                    <div class="input-group"><label>RH (%)</label><input type="number" id="rh" value="70"></div>
                    <div class="input-group"><label>CAPE (J/kg)</label><input type="number" id="cape" value="0"></div>
                    <div class="input-group"><label>LI Index</label><input type="number" id="li" value="0"></div>
                    <div class="input-group"><label>DPD (°C)</label><input type="number" id="dpd" value="5"></div>
                    <div class="input-group"><label>Shear 0-6km</label><input type="number" id="shear" value="0"></div>
                    <div class="input-group full"><label>SRH 0-3km (m²/s²)</label><input type="number" id="srh" value="0"></div>
                </div>
                <button class="execute-btn" onclick="runMDL()">Рассчитать модель</button>
            </div>

            <div class="card">
                <h3>Конвертеры</h3>
                <div class="converter-section">
                    <div class="input-group"><label>м/с</label><input type="number" id="ms" oninput="conv('ms')"></div>
                    <div class="input-group"><label>км/ч</label><input type="number" id="kmh" oninput="conv('kmh')"></div>
                    <div class="input-group"><label>hPa</label><input type="number" id="hpa" oninput="conv('hpa')"></div>
                    <div class="input-group"><label>мм рт.ст.</label><input type="number" id="mmhg" oninput="conv('mmhg')"></div>
                    <div class="input-group"><label>°C</label><input type="number" id="cels" oninput="conv('cels')"></div>
                    <div class="input-group"><label>°F</label><input type="number" id="fahr" oninput="conv('fahr')"></div>
                </div>
            </div>
        </div>

        <div class="results-grid">
            <div class="extra-panel">
                <div class="stat-card"><span class="stat-val" id="lcl-val">0</span><span class="stat-label">LCL (Метры)</span></div>
                <div class="stat-card"><span class="stat-val" id="chill-val">0</span><span class="stat-label">Ощущается (°C)</span></div>
                <div class="stat-card"><span class="stat-val" id="beaufort-val">0</span><span class="stat-label">Баллы Бофорта</span></div>
            </div>

            <div class="card">
                <h3>Осадки и Облачность</h3>
                <div class="metric"><div class="m-info"><span>Общие осадки</span><span id="p1">0%</span></div><div class="m-bar"><div id="b1" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Ливневые осадки</span><span id="p2">0%</span></div><div class="m-bar"><div id="b2" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Кучевая (Cu)</span><span id="p3">0%</span></div><div class="m-bar"><div id="b3" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Слоистая (St)</span><span id="p4">0%</span></div><div class="m-bar"><div id="b4" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Туман</span><span id="p5">0%</span></div><div class="m-bar"><div id="b5" class="m-fill"></div></div></div>
            </div>

            <div class="card">
                <h3>Опасные явления</h3>
                <div class="metric"><div class="m-info"><span>Грозы</span><span id="p6">0%</span></div><div class="m-bar"><div id="b6" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Суперячейки</span><span id="p7">0%</span></div><div class="m-bar"><div id="b7" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Шквал</span><span id="p8">0%</span></div><div class="m-bar"><div id="b8" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Торнадо-индекс</span><span id="p9">0%</span></div><div class="m-bar"><div id="b9" class="m-fill"></div></div></div>
            </div>
        </div>
    </div>

    <script>
        function exit() { sessionStorage.clear(); window.location.reload(); }

        const sunSVG = '<path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0 c-0.55,0-1,0.45-1,1S1.45,13,2,13L2,13z M20,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13L20,13z M11,2l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2c0-0.55-0.45-1-1-1S11,1.45,11,2L11,2z M11,20l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2 c0-0.55-0.45-1-1-1S11,19.45,11,20L11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06 c0.39,0.39,1.03,0.39,1.41,0s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41 l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41L18.36,16.95z M19.42,5.99c0.39-0.39,0.39-1.03,0-1.41 c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L19.42,5.99z M7.05,18.36 c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L7.05,18.36z"/>';
        const moonSVG = '<path d="M12,3c-4.97,0-9,4.03-9,9s4.03,9,9,9s9-4.03,9-9c0-0.46-0.04-0.92-0.1-1.36c-0.98,1.37-2.58,2.26-4.4,2.26 c-2.98,0-5.4-2.42-5.4-5.4c0-1.81,0.89-3.42,2.26-4.4C12.92,3.04,12.46,3,12,3L12,3z"/>';

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const icon = document.getElementById('theme-icon');
            icon.innerHTML = document.body.classList.contains('dark-theme') ? sunSVG : moonSVG;
        }

        function conv(type) {
            const v = parseFloat(document.getElementById(type).value) || 0;
            if(type === 'ms') document.getElementById('kmh').value = (v * 3.6).toFixed(1);
            if(type === 'kmh') document.getElementById('ms').value = (v / 3.6).toFixed(1);
            if(type === 'hpa') document.getElementById('mmhg').value = (v * 0.750062).toFixed(1);
            if(type === 'mmhg') document.getElementById('hpa').value = (v / 0.750062).toFixed(1);
            if(type === 'cels') document.getElementById('fahr').value = ((v * 9/5) + 32).toFixed(1);
            if(type === 'fahr') document.getElementById('cels').value = ((v - 32) * 5/9).toFixed(1);
        }

        function sat(v, k=0.5, s=5) { return v <= 0 ? 0 : (1/(1+Math.exp(-k*(v-s))))*100; }

        function runMDL() {
            const t = parseFloat(document.getElementById('temp').value) || 0;
            const d = parseFloat(document.getElementById('dew').value) || 0;
            const w = parseFloat(document.getElementById('wind').value) || 0;
            const rh = parseFloat(document.getElementById('rh').value) || 0;
            const c = parseFloat(document.getElementById('cape').value) || 0;
            const li = parseFloat(document.getElementById('li').value) || 0;
            const dpd = parseFloat(document.getElementById('dpd').value) || 0;
            const s = parseFloat(document.getElementById('shear').value) || 0;
            const srh = parseFloat(document.getElementById('srh').value) || 0;

            const lcl = Math.max(0, 125 * (t - d));
            const chill = (t <= 10 && w >= 1.3) ? (13.12 + 0.6215*t - 11.37*Math.pow(w*3.6, 0.16) + 0.3965*t*Math.pow(w*3.6, 0.16)) : t;
            
            let bft = 0;
            if (w >= 0.3) bft = 1; if (w >= 1.6) bft = 2; if (w >= 3.4) bft = 3; if (w >= 5.5) bft = 4;
            if (w >= 8.0) bft = 5; if (w >= 10.8) bft = 6; if (w >= 13.9) bft = 7; if (w >= 17.2) bft = 8;
            if (w >= 20.8) bft = 9; if (w >= 24.5) bft = 10; if (w >= 28.5) bft = 11; if (w >= 32.7) bft = 12;

            const res = [
                (rh > 75 ? (rh - 75) * 4 + (dpd < 2 ? 15 : 0) : 0),
                (c > 150 && rh > 65 ? sat(c/400 + rh/30, 0.6, 6) : 0),
                (sat(c/200 + t/15, 0.5, 5) + (lcl > 500 && lcl < 2000 ? 30 : 0)),
                (rh > 85 && dpd < 3 ? sat(rh - 80, 0.8, 5) : 0),
                (rh > 95 && dpd < 1 && w < 4 ? sat(rh - 90, 1.5, 4) + (3 - w)*10 : 0),
                (c > 400 && li < 0 ? sat(c/500 + Math.abs(li)/2, 0.6, 5) : 0),
                (c > 1000 && s > 15 && srh > 100 ? sat((c/1500) * (s/15) * (srh/100), 0.7, 4) : 0),
                (c > 500 && (w > 10 || s > 15) ? sat((c/1000) * (s/12) * (dpd > 8 ? 1.5 : 1), 0.6, 5) : 0),
                (c > 800 && srh > 150 && lcl < 1500 ? sat((srh/150) * (s/20) * (2000/(lcl+100)), 0.8, 3) : 0)
            ];

            document.getElementById('lcl-val').innerText = lcl.toFixed(0);
            document.getElementById('chill-val').innerText = chill.toFixed(1);
            document.getElementById('beaufort-val').innerText = bft;

            res.forEach((v, i) => {
                let f = Math.min(100, Math.max(0, v));
                document.getElementById('p'+(i+1)).innerText = f.toFixed(1) + '%';
                document.getElementById('b'+(i+1)).style.width = f + '%';
                const bar = document.getElementById('b'+(i+1));
                if (i >= 5 && f > 50) bar.style.background = 'linear-gradient(180deg, #ff4545 0%, #d00000 100%)';
                else bar.style.background = 'var(--accent-grad)';
            });
        }
    </script>
</body>
</html>
