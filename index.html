<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDL | Advanced Weather System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #f4f7f9;
            --card: #ffffff;
            --accent: #0052ff;
            --text: #1c1c1e;
            --border: #e5e5ea;
            --danger: #ff3b30;
            --bar-bg: #f2f2f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }

        /* AUTH SCREEN */
        #auth-screen {
            width: 100%; max-width: 400px; background: var(--card); padding: 40px; border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border);
        }
        .auth-logo { font-weight: 900; font-size: 32px; color: var(--accent); letter-spacing: -1.5px; margin-bottom: 30px; }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 14px; border: 1px solid var(--border); background: #f9f9fb; font-size: 16px; outline: none; }
        .auth-btn { width: 100%; padding: 16px; background: var(--text); color: #fff; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .auth-btn:hover { background: var(--accent); }

        /* MAIN APP */
        #main-app { display: none; width: 100%; height: 100vh; flex-direction: column; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* NAVIGATION */
        nav { background: var(--card); border-bottom: 1px solid var(--border); display: flex; padding: 0 20px; gap: 20px; align-items: center; height: 60px; }
        .nav-logo { font-weight: 900; color: var(--accent); margin-right: 20px; }
        .nav-link { font-size: 13px; font-weight: 700; color: #8e8e93; text-decoration: none; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; }
        .nav-link.active { color: var(--accent); background: rgba(0, 82, 255, 0.05); }

        /* CONTENT TAB 1 (MDL COMPUTE) */
        .tab-content { display: none; flex-grow: 1; padding: 30px; overflow-y: auto; }
        .tab-content.active { display: flex; gap: 25px; justify-content: center; }

        .sidebar { width: 380px; background: var(--card); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); height: fit-content; border: 1px solid var(--border); }
        .input-box { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-bottom: 5px; }
        input[type="number"] { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: #f9f9fb; font-size: 15px; font-weight: 600; outline: none; }
        .execute-btn { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--text); color: #fff; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        .main-display { flex-grow: 1; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .res-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .res-card h3 { font-size: 11px; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #f2f2f7; padding-bottom: 8px; }
        .metric { margin-bottom: 18px; }
        .metric-info { display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: 700; font-size: 13px; }
        .metric-bar { width: 100%; height: 6px; background: var(--bar-bg); border-radius: 10px; overflow: hidden; }
        .metric-fill { height: 100%; width: 0%; background: var(--accent); transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .danger-fill { background: var(--danger) !important; }

        /* CONTENT TAB 2 (MAP) */
        #map-tab { width: 100%; height: calc(100vh - 60px); position: relative; }
        #map { width: 100%; height: 100%; }

        /* POPUP STYLING */
        .leaflet-popup-content-wrapper { border-radius: 15px; padding: 5px; }
        .station-info h4 { color: var(--accent); margin-bottom: 5px; }
        .station-info p { font-size: 12px; margin: 3px 0; font-weight: 600; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-logo">MDL CORE</div>
        <div class="auth-subtitle">Meteorological Access</div>
        <input type="text" id="user" class="auth-input" placeholder="root">
        <input type="password" id="pass" class="auth-input" placeholder="MDL">
        <button class="auth-btn" onclick="login()">Войти в систему</button>
        <div id="error" style="color: var(--danger); font-size: 12px; margin-top: 15px; display: none;">Ошибка доступа</div>
    </div>

    <div id="main-app">
        <nav>
            <div class="nav-logo">MDL v1.2</div>
            <div class="nav-link active" onclick="switchTab('compute', event)">01 Compute Core</div>
            <div class="nav-link" onclick="switchTab('map', event)">02 Station Map (Kazakhstan)</div>
        </nav>

        <div id="compute-tab" class="tab-content active">
            <div class="sidebar">
                <div class="input-box"><label>CAPE (J/kg)</label><input type="number" id="cape" value="0"></div>
                <div class="input-box"><label>LI (Stability)</label><input type="number" id="li" value="0"></div>
                <div class="input-box"><label>Shear 0-6km (m/s)</label><input type="number" id="shear" value="0"></div>
                <div class="input-box"><label>SRH 0-3km (m2/s2)</label><input type="number" id="srh" value="0"></div>
                <div class="input-box"><label>RH (%) Humidity</label><input type="number" id="rh" value="0"></div>
                <div class="input-box"><label>DPD (°C) Deficit</label><input type="number" id="dpd" value="0"></div>
                <button class="execute-btn" onclick="runMDL()">Compute Model</button>
            </div>
            <div class="main-display">
                <div class="res-card">
                    <h3>Clouds & Rain</h3>
                    <div id="metrics-rain"></div>
                </div>
                <div class="res-card">
                    <h3>Storm Core</h3>
                    <div id="metrics-storm"></div>
                </div>
            </div>
        </div>

        <div id="map-tab" class="tab-content">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;

        function login() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            if(user === 'root' && pass === 'MDL') {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                initMap();
                renderMetrics();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function switchTab(tab, e) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            e.currentTarget.classList.add('active');
            if(tab === 'map') {
                setTimeout(() => map.invalidateSize(), 200);
            }
        }

        // --- КАРТА И СТАНЦИИ ---
        function initMap() {
            if (map) return;
            // Центр Казахстана
            map = L.map('map').setView([48.0196, 66.9237], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Пример точек метеостанций (имитация ответа API Meteostat для РК)
            const stations = [
                { name: "Pavlodar (36003)", lat: 52.28, lon: 76.96, t: 18.4, p: 1012, w: 5, d: "СВ" },
                { name: "Astana (35188)", lat: 51.16, lon: 71.45, t: 20.1, p: 1008, w: 8, d: "ЮЗ" },
                { name: "Almaty (36870)", lat: 43.23, lon: 76.88, t: 24.5, p: 1005, w: 3, d: "Ш" },
                { name: "Karaganda (35394)", lat: 49.80, lon: 73.08, t: 19.2, p: 1010, w: 6, d: "С" },
                { name: "Aktau (38457)", lat: 44.51, lon: 50.26, t: 27.8, p: 1015, w: 12, d: "З" }
            ];

            stations.forEach(st => {
                const marker = L.marker([st.lat, st.lon]).addTo(map);
                marker.bindPopup(`
                    <div class="station-info">
                        <h4>${st.name}</h4>
                        <p>Температура: ${st.t}°C</p>
                        <p>Давление: ${st.p} hPa</p>
                        <p>Ветер: ${st.w} м/с (${st.d})</p>
                    </div>
                `);
            });
        }

        // --- MDL COMPUTE LOGIC ---
        function mdlSaturate(val, k = 0.5, shift = 5) {
            if (val <= 0) return 0;
            return Math.round((1 / (1 + Math.exp(-k * (val - shift)))) * 100);
        }

        function renderMetrics() {
            const rainKeys = ["Общие осадки", "Ливневые дожди", "Кучевые облака", "Слоистые облака", "Туман"];
            const stormKeys = ["Грозы", "Суперячейки", "Штормовой ветер", "Торнадо"];
            
            document.getElementById('metrics-rain').innerHTML = rainKeys.map((k, i) => `
                <div class="metric"><div class="metric-info"><span>${k}</span><span id="p${i+1}">0%</span></div>
                <div class="metric-bar"><div id="b${i+1}" class="metric-fill"></div></div></div>
            `).join('');

            document.getElementById('metrics-storm').innerHTML = stormKeys.map((k, i) => `
                <div class="metric"><div class="metric-info"><span>${k}</span><span id="p${i+6}">0%</span></div>
                <div class="metric-bar"><div id="b${i+6}" class="metric-fill"></div></div></div>
            `).join('');
        }

        function runMDL() {
            const cape = parseFloat(document.getElementById('cape').value) || 0;
            const li = parseFloat(document.getElementById('li').value) || 0;
            const shear = parseFloat(document.getElementById('shear').value) || 0;
            const srh = parseFloat(document.getElementById('srh').value) || 0;
            const rh = parseFloat(document.getElementById('rh').value) || 0;
            const dpd = parseFloat(document.getElementById('dpd').value) || 0;

            let vals = [];
            vals[0] = (rh > 65) ? Math.min((rh - 65) * 2.8, 100) : 0;
            vals[1] = (cape > 400 && rh > 60) ? mdlSaturate((cape/400) + Math.abs(li), 0.6, 4) : 0;
            vals[2] = (cape > 50 || rh > 45) ? mdlSaturate((cape/250) + (rh/12), 0.5, 6) : 0;
            vals[3] = (rh > 80 && li >= -1) ? mdlSaturate((rh-75)*2, 0.7, 10) : 0;
            vals[4] = (rh > 92 && dpd < 1) ? mdlSaturate((1 - dpd)*80, 0.9, 2) : 0;
            vals[5] = (cape > 250) ? mdlSaturate((cape/450) + Math.abs(li)*1.5, 0.6, 5) : 0;
            
            let scp = (cape/1000)*(srh/50)*(shear/20);
            vals[6] = (vals[5] > 15) ? (mdlSaturate(scp * 2.5, 0.7, 4) / 100) * vals[5] : 0;
            
            let windFactor = (shear * 1.1) + (cape / 1500) + (dpd * 0.5);
            vals[7] = (vals[5] > 10) ? mdlSaturate(windFactor, 0.4, 18) : 0;
            
            let stp = (cape/1500)*(srh/150)*(shear/20)*(Math.max(0, 15-dpd)/15);
            vals[8] = (vals[6] > 20 && dpd < 8) ? (mdlSaturate(stp * 4.5, 0.8, 6) / 100) * vals[6] : 0;

            vals.forEach((v, i) => {
                let rounded = Math.round(v);
                document.getElementById('p' + (i+1)).innerText = rounded + '%';
                let bar = document.getElementById('b' + (i+1));
                bar.style.width = rounded + '%';
                bar.classList.toggle('danger-fill', rounded > 75);
            });
        }
    </script>
</body>
</html>
