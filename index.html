<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        if (sessionStorage.getItem('auth_key') !== 'GRANTED_v13') {
            window.location.replace('auth.html');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDL | Core v1.3 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f9;
            --card: #ffffff;
            --accent: #0052ff;
            --text: #1c1c1e;
            --border: #e5e5ea;
            --bar-bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.7);
        }

        .dark-theme {
            --bg: #0a0a0c;
            --card: #1c1c1e;
            --accent: #3a82ff;
            --text: #ffffff;
            --border: #2c2c2e;
            --bar-bg: #2c2c2e;
            --glass: rgba(28, 28, 30, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        nav { 
            background: var(--card); border-bottom: 1px solid var(--border); 
            display: flex; padding: 0 20px; align-items: center; height: 70px; position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 20px; flex-grow: 1; letter-spacing: -1px; }
        
        .nav-tools { display: flex; align-items: center; gap: 15px; }

        .icon-btn { 
            background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 12px;
        }
        .icon-btn:hover { background: var(--bar-bg); }
        .icon-btn svg { width: 22px; height: 22px; fill: var(--text); }

        .exit-btn { font-size: 11px; font-weight: 800; color: #ff4545; cursor: pointer; text-transform: uppercase; border: 1px solid #ff4545; padding: 6px 12px; border-radius: 8px; }

        .tab-content { display: flex; flex-direction: column; padding: 20px; gap: 20px; max-width: 1300px; margin: 0 auto; width: 100%; }
        
        @media (min-width: 900px) {
            .tab-content { display: grid; grid-template-columns: 350px 1fr; }
        }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }

        .card { 
            background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid var(--border); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        
        h3 { font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: 700; outline: none; }
        
        .execute-btn { 
            width: 100%; padding: 18px; border-radius: 14px; background: var(--accent); color: #fff; 
            font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 20px rgba(0, 82, 255, 0.2);
        }

        .conv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .results-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1100px) { .results-grid { grid-template-columns: 1fr 1fr; } }
        
        .metric { margin-bottom: 15px; }
        .m-info { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .m-bar { height: 8px; background: var(--bar-bg); border-radius: 10px; overflow: hidden; }
        .m-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 10px; transition: 1s cubic-bezier(0.2, 1, 0.2, 1); }

        .extra-panel { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; text-align: center; }
        .stat-val { display: block; font-size: 24px; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        .stat-label { font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">MDL CORE</div>
        <div class="nav-tools">
            <div class="exit-btn" onclick="exit()">Выход</div>
            <button class="icon-btn" onclick="toggleTheme()">
                <svg id="theme-icon" viewBox="0 0 24 24">
                    <path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0 c-0.55,0-1,0.45-1,1S1.45,13,2,13L2,13z M20,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13L20,13z M11,2l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2c0-0.55-0.45-1-1-1S11,1.45,11,2L11,2z M11,20l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2 c0-0.55-0.45-1-1-1S11,19.45,11,20L11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06 c0.39,0.39,1.03,0.39,1.41,0s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41 l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41L18.36,16.95z M19.42,5.99c0.39-0.39,0.39-1.03,0-1.41 c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L19.42,5.99z M7.05,18.36 c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L7.05,18.36z"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="tab-content">
        <div class="sidebar">
            <div class="card">
                <h3>Входные параметры</h3>
                <div class="input-group"><label>Температура (°C)</label><input type="number" id="temp" value="15"></div>
                <div class="input-group"><label>Точка росы (Td)</label><input type="number" id="dew" value="10"></div>
                <div class="input-group"><label>Ветер (м/с)</label><input type="number" id="wind" value="5"></div>
                <div class="input-group"><label>CAPE (J/kg)</label><input type="number" id="cape" value="0"></div>
                <div class="input-group"><label>Shear 0-6km</label><input type="number" id="shear" value="0"></div>
                <button class="execute-btn" onclick="runMDL()">Рассчитать</button>
            </div>

            <div class="card">
                <h3>Конвертер скорости</h3>
                <div class="conv-grid">
                    <div class="input-group"><label>м/с</label><input type="number" id="ms" oninput="convSpeed('ms')"></div>
                    <div class="input-group"><label>км/ч</label><input type="number" id="kmh" oninput="convSpeed('kmh')"></div>
                </div>
                <h3>Давление</h3>
                <div class="conv-grid">
                    <div class="input-group"><label>hPa</label><input type="number" id="hpa" oninput="convPress('hpa')"></div>
                    <div class="input-group"><label>мм рт.ст.</label><input type="number" id="mmhg" oninput="convPress('mmhg')"></div>
                </div>
            </div>
        </div>

        <div class="results-grid">
            <div class="extra-panel">
                <div class="stat-card"><span class="stat-val" id="lcl-val">0</span><span class="stat-label">LCL (Метры)</span></div>
                <div class="stat-card"><span class="stat-val" id="chill-val">0</span><span class="stat-label">Wind Chill (°C)</span></div>
                <div class="stat-card"><span class="stat-val" id="beaufort-val">0</span><span class="stat-label">Бофорт (Bft)</span></div>
            </div>

            <div class="card">
                <h3>Тип погоды</h3>
                <div class="metric"><div class="m-info"><span>Общие осадки</span><span id="p1">0%</span></div><div class="m-bar"><div id="b1" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Ливневые</span><span id="p2">0%</span></div><div class="m-bar"><div id="b2" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Кучевая обл.</span><span id="p3">0%</span></div><div class="m-bar"><div id="b3" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Слоистая обл.</span><span id="p4">0%</span></div><div class="m-bar"><div id="b4" class="m-fill"></div></div></div>
            </div>

            <div class="card">
                <h3>Экстремальные явления</h3>
                <div class="metric"><div class="m-info"><span>Гроза</span><span id="p5">0%</span></div><div class="m-bar"><div id="b5" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Суперячейка</span><span id="p6">0%</span></div><div class="m-bar"><div id="b6" class="m-fill"></div></div></div>
                <div class="metric"><div class="m-info"><span>Шквал</span><span id="p7">0%</span></div><div class="m-bar"><div id="b7" class="m-fill"></div></div></div>
            </div>
        </div>
    </div>

    <script>
        function exit() { sessionStorage.clear(); window.location.reload(); }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const icon = document.getElementById('theme-icon');
            if(document.body.classList.contains('dark-theme')) {
                icon.innerHTML = '<path d="M12,3c-4.97,0-9,4.03-9,9s4.03,9,9,9s9-4.03,9-9c0-0.46-0.04-0.92-0.1-1.36c-0.98,1.37-2.58,2.26-4.4,2.26 c-2.98,0-5.4-2.42-5.4-5.4c0-1.81,0.89-3.42,2.26-4.4C12.92,3.04,12.46,3,12,3L12,3z"/>';
            } else {
                icon.innerHTML = '<path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0 c-0.55,0-1,0.45-1,1S1.45,13,2,13L2,13z M20,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13L20,13z M11,2l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2c0-0.55-0.45-1-1-1S11,1.45,11,2L11,2z M11,20l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2 c0-0.55-0.45-1-1-1S11,19.45,11,20L11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06 c0.39,0.39,1.03,0.39,1.41,0s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41 l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41L18.36,16.95z M19.42,5.99c0.39-0.39,0.39-1.03,0-1.41 c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L19.42,5.99z M7.05,18.36 c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L7.05,18.36z"/>';
            }
        }

        function convSpeed(type) {
            const ms = document.getElementById('ms');
            const kmh = document.getElementById('kmh');
            if(type === 'ms') kmh.value = (ms.value * 3.6).toFixed(1);
            else ms.value = (kmh.value / 3.6).toFixed(1);
        }

        function convPress(type) {
            const hpa = document.getElementById('hpa');
            const mmhg = document.getElementById('mmhg');
            if(type === 'hpa') mmhg.value = (hpa.value * 0.750062).toFixed(1);
            else hpa.value = (mmhg.value / 0.750062).toFixed(1);
        }

        function sat(v, k=0.5, s=5) { return v <= 0 ? 0 : (1/(1+Math.exp(-k*(v-s))))*100; }

        function runMDL() {
            const t = parseFloat(document.getElementById('temp').value) || 0;
            const d = parseFloat(document.getElementById('dew').value) || 0;
            const w = parseFloat(document.getElementById('wind').value) || 0;
            const c = parseFloat(document.getElementById('cape').value) || 0;
            const s = parseFloat(document.getElementById('shear').value) || 0;

            const lcl = Math.max(0, 122 * (t - d));
            const chill = (t <= 10) ? (13.12 + 0.6215*t - 11.37*Math.pow(w*3.6, 0.16) + 0.3965*t*Math.pow(w*3.6, 0.16)) : t;
            
            let bft = 0;
            if (w >= 0.3) bft = 1; if (w >= 1.6) bft = 2; if (w >= 3.4) bft = 3; if (w >= 5.5) bft = 4;
            if (w >= 8.0) bft = 5; if (w >= 10.8) bft = 6; if (w >= 13.9) bft = 7; if (w >= 17.2) bft = 8;
            if (w >= 20.8) bft = 9; if (w >= 24.5) bft = 10; if (w >= 28.5) bft = 11; if (w >= 32.7) bft = 12;

            const res = [
                sat(c/10, 0.1, 10),
                sat(c/5, 0.2, 8),
                (c > 100 ? 80 : 10),
                (t-d < 2 ? 70 : 10),
                sat(c/800, 0.5, 5),
                (c > 1500 && s > 20 ? 60 : 5),
                sat(s + c/1000, 0.3, 15)
            ];

            document.getElementById('lcl-val').innerText = lcl.toFixed(0);
            document.getElementById('chill-val').innerText = chill.toFixed(1);
            document.getElementById('beaufort-val').innerText = bft;

            res.forEach((v, i) => {
                let f = Math.min(100, Math.max(0, v));
                document.getElementById('p'+(i+1)).innerText = f.toFixed(1) + '%';
                document.getElementById('b'+(i+1)).style.width = f + '%';
            });
        }
    </script>
</body>
</html>
