<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDL | Meteorological Data Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #f4f7f9;
            --card: #ffffff;
            --accent: #0052ff;
            --text: #1c1c1e;
            --border: #e5e5ea;
            --danger: #ff3b30;
            --bar-bg: #f2f2f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* ОКНО ВХОДА */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .auth-box {
            width: 100%; max-width: 400px; background: var(--card); padding: 40px; border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border);
        }
        .auth-logo { font-weight: 900; font-size: 32px; color: var(--accent); letter-spacing: -1.5px; margin-bottom: 30px; }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 14px; border: 1px solid var(--border); background: #f9f9fb; font-size: 16px; outline: none; }
        .auth-btn { width: 100%; padding: 16px; background: var(--text); color: #fff; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        #main-app { display: none; flex-direction: column; height: 100vh; }
        nav { background: var(--card); border-bottom: 1px solid var(--border); display: flex; padding: 0 30px; gap: 25px; align-items: center; height: 70px; flex-shrink: 0; }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 22px; margin-right: 20px; }
        .nav-link { font-size: 13px; font-weight: 800; color: #8e8e93; text-transform: uppercase; cursor: pointer; padding: 10px 15px; border-radius: 10px; transition: 0.2s; }
        .nav-link.active { color: var(--accent); background: rgba(0, 82, 255, 0.08); }

        .tab-content { display: none; padding: 30px; overflow-y: auto; width: 100%; max-width: 1400px; margin: 0 auto; }
        .tab-content.active { display: grid; }

        /* ВКЛАДКА 1: MDL */
        #compute-tab { grid-template-columns: 380px 1fr; gap: 30px; }
        .sidebar { background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid var(--border); height: fit-content; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .sidebar h1 { font-weight: 900; font-size: 26px; color: var(--accent); }
        .sidebar p { font-size: 11px; color: #8e8e93; text-transform: uppercase; font-weight: 800; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-bottom: 6px; }
        input[type="number"] { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #f9f9fb; font-weight: 700; outline: none; }
        .execute-btn { width: 100%; padding: 18px; border-radius: 14px; background: var(--text); color: #fff; font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; margin-top: 10px; }

        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .res-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid var(--border); }
        .res-card h3 { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #f2f2f7; padding-bottom: 10px; }
        
        .metric-row { margin-bottom: 18px; }
        .m-info { display: flex; justify-content: space-between; font-weight: 700; font-size: 13px; margin-bottom: 8px; }
        .m-bar { width: 100%; height: 7px; background: var(--bar-bg); border-radius: 10px; overflow: hidden; }
        .m-fill { height: 100%; width: 0%; background: var(--accent); transition: 1s cubic-bezier(0.2, 1, 0.2, 1); }
        .danger { background: var(--danger) !important; }

        /* ВКЛАДКА 2: ИНСТРУМЕНТЫ */
        #tools-tab { grid-template-columns: 1fr 1fr; gap: 25px; }
        .map-box { grid-column: 1 / -1; height: 450px; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
        #map { width: 100%; height: 100%; }

        .conv-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .conv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: end; }
        
        .st-header { font-weight: 900; color: var(--accent); border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .st-time { font-size: 10px; color: var(--danger); font-weight: 800; display: block; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-logo">MDL CORE</div>
            <input type="text" id="user" class="auth-input" placeholder="User ID">
            <input type="password" id="pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="login()">Access System</button>
            <p id="err" style="color: var(--danger); font-size: 12px; margin-top: 15px; display: none; font-weight: 700;">ACCESS DENIED</p>
        </div>
    </div>

    <div id="main-app">
        <nav>
            <div class="nav-logo">MDL v1.1</div>
            <div class="nav-link active" onclick="switchTab('compute', event)">01 MDL CORE</div>
            <div class="nav-link" onclick="switchTab('tools', event)">02 Метео-Инструменты</div>
        </nav>

        <div id="compute-tab" class="tab-content active">
            <div class="sidebar">
                <h1>MDL ANALYSIS</h1>
                <p>Advanced Logic Unit</p>
                <div class="input-group"><label>CAPE (J/kg)</label><input type="number" id="cape" value="0"></div>
                <div class="input-group"><label>LI (Index)</label><input type="number" id="li" value="0"></div>
                <div class="input-group"><label>Shear 0-6km</label><input type="number" id="shear" value="0"></div>
                <div class="input-group"><label>SRH 0-3km</label><input type="number" id="srh" value="0"></div>
                <div class="input-group"><label>Humidity RH%</label><input type="number" id="rh" value="0"></div>
                <div class="input-group"><label>DPD Deficit</label><input type="number" id="dpd" value="0"></div>
                <div class="input-group"><label>Vorticity</label><input type="number" id="vort" value="0"></div>
                <button class="execute-btn" onclick="runMDL()">Compute</button>
            </div>

            <div class="results-grid">
                <div class="res-card">
                    <h3>Thunderstorm & Cells</h3>
                    <div class="metric-row"><div class="m-info"><span>Грозовая активность</span><span id="p6">0%</span></div><div class="m-bar"><div id="b6" class="m-fill"></div></div></div>
                    <div class="metric-row"><div class="m-info"><span>Суперячейки</span><span id="p7">0%</span></div><div class="m-bar"><div id="b7" class="m-fill"></div></div></div>
                </div>
                <div class="res-card">
                    <h3>Wind & Tornado</h3>
                    <div class="metric-row"><div class="m-info"><span>Шквалы</span><span id="p8">0%</span></div><div class="m-bar"><div id="b8" class="m-fill"></div></div></div>
                    <div class="metric-row"><div class="m-info"><span>Торнадо-индекс</span><span id="p9">0%</span></div><div class="m-bar"><div id="b9" class="m-fill"></div></div></div>
                </div>
            </div>
        </div>

        <div id="tools-tab" class="tab-content">
            <div class="map-box"><div id="map"></div></div>
            
            <div class="conv-card">
                <h3>Конвертер давления</h3>
                <div class="conv-grid">
                    <div class="input-group"><label>гПа (hPa)</label><input type="number" id="hpa" oninput="convPres('hpa')"></div>
                    <div class="input-group"><label>мм рт. ст.</label><input type="number" id="mmhg" oninput="convPres('mm')"></div>
                </div>
            </div>

            <div class="conv-card">
                <h3>Конвертер ветра</h3>
                <div class="conv-grid">
                    <div class="input-group"><label>м/с (m/s)</label><input type="number" id="ms" oninput="convWind('ms')"></div>
                    <div class="input-group"><label>Узлы (Knots)</label><input type="number" id="kt" oninput="convWind('kt')"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'root' && p === 'MDL') {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                initMap();
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }

        function switchTab(t, e) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(t + '-tab').classList.add('active');
            e.target.classList.add('active');
            if(t === 'tools') setTimeout(() => map.invalidateSize(), 200);
        }

        function convPres(type) {
            const h = document.getElementById('hpa');
            const m = document.getElementById('mmhg');
            if(type === 'hpa') m.value = (h.value * 0.750062).toFixed(1);
            else h.value = (m.value / 0.750062).toFixed(1);
        }

        function convWind(type) {
            const ms = document.getElementById('ms');
            const kt = document.getElementById('kt');
            if(type === 'ms') kt.value = (ms.value * 1.94384).toFixed(1);
            else ms.value = (kt.value / 1.94384).toFixed(1);
        }

        function initMap() {
            if(map) return;
            map = L.map('map').setView([48.5, 67.5], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            const stations = [
                {n: "Павлодар", lat: 52.28, lon: 76.96, t: 14.2, p: 1011.1, w: 3.2, up: "18:45"},
                {n: "Жезказган", lat: 47.78, lon: 67.76, t: 19.5, p: 1008.4, w: 5.1, up: "19:00"},
                {n: "Караганда", lat: 49.80, lon: 73.08, t: 16.8, p: 1010.2, w: 4.4, up: "18:55"},
                {n: "Атырау", lat: 47.11, lon: 51.91, t: 24.1, p: 1013.5, w: 8.7, up: "19:10"},
                {n: "Тараз", lat: 42.90, lon: 71.37, t: 26.3, p: 1006.8, w: 2.9, up: "18:30"},
                {n: "Усть-Каменогорск", lat: 49.95, lon: 82.61, t: 13.9, p: 1012.3, w: 2.5, up: "19:05"}
            ];

            stations.forEach(s => {
                L.marker([s.lat, s.lon]).addTo(map).bindPopup(`
                    <div class="st-header">${s.n}</div>
                    <b>Темп:</b> ${s.t.toFixed(1)}°C<br>
                    <b>Давление:</b> ${s.p.toFixed(1)} hPa<br>
                    <b>Ветер:</b> ${s.w.toFixed(1)} м/с<br>
                    <span class="st-time">ОТЧЕТ: СЕГОДНЯ ${s.up}</span>
                `);
            });
        }

        function mdlSaturate(v, k=0.5, s=5) { return v <= 0 ? 0 : (1/(1+Math.exp(-k*(v-s))))*100; }

        function runMDL() {
            const cape = parseFloat(document.getElementById('cape').value) || 0;
            const li = parseFloat(document.getElementById('li').value) || 0;
            const shear = parseFloat(document.getElementById('shear').value) || 0;
            const srh = parseFloat(document.getElementById('srh').value) || 0;
            const rh = parseFloat(document.getElementById('rh').value) || 0;
            const dpd = parseFloat(document.getElementById('dpd').value) || 0;
            const vort = parseFloat(document.getElementById('vort').value) || 0;

            let storms = (cape > 250) ? mdlSaturate((cape/450) + Math.abs(li)*1.5, 0.6, 5) : 0;
            let scp = (cape / 1000) * (srh / 50) * (shear / 20);
            let supercells = (storms > 15) ? (mdlSaturate(scp * 2.5 + vort, 0.7, 4)/100)*storms : 0;
            let wind = (storms > 10) ? mdlSaturate((shear * 1.1) + (cape / 1500), 0.4, 18) : 0;
            let stp = (cape / 1500) * (srh / 150) * (shear / 20);
            let tornado = (supercells > 20) ? (mdlSaturate(stp * 4.5, 0.8, 6)/100)*supercells : 0;

            const up = (id, v) => {
                document.getElementById('p'+id).innerText = Math.round(v) + '%';
                const b = document.getElementById('b'+id);
                b.style.width = v + '%';
                b.classList.toggle('danger', v > 75);
            };

            up(6, storms); up(7, supercells); up(8, wind); up(9, tornado);
        }
    </script>
</body>
</html>
