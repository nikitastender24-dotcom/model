<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDL | Meteorological Data Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #f4f7f9;
            --card: #ffffff;
            --accent: #0052ff;
            --text: #1c1c1e;
            --border: #e5e5ea;
            --danger: #ff3b30;
            --bar-bg: #f2f2f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* AUTH SCREEN */
        #auth-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; max-width: 400px; background: var(--card); padding: 40px; border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border); z-index: 1000;
        }
        .auth-logo { font-weight: 900; font-size: 32px; color: var(--accent); letter-spacing: -1.5px; margin-bottom: 10px; }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 14px; border: 1px solid var(--border); background: #f9f9fb; outline: none; }
        .auth-btn { width: 100%; padding: 16px; background: var(--text); color: #fff; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }

        /* MAIN APP */
        #main-app { display: none; width: 100%; height: 100vh; flex-direction: column; }
        nav { background: var(--card); border-bottom: 1px solid var(--border); display: flex; padding: 0 20px; gap: 20px; align-items: center; height: 60px; flex-shrink: 0; }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 20px; margin-right: 20px;}
        .nav-link { font-size: 13px; font-weight: 700; color: #8e8e93; cursor: pointer; padding: 10px 15px; border-radius: 8px; }
        .nav-link.active { color: var(--accent); background: rgba(0, 82, 255, 0.05); }

        .tab-content { display: none; flex-grow: 1; padding: 30px; overflow-y: auto; width: 100%; max-width: 1400px; margin: 0 auto; }
        .tab-content.active { display: grid; }

        /* COMPUTE TAB */
        #compute-tab { grid-template-columns: 380px 1fr; gap: 25px; }
        .sidebar { background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid var(--border); height: fit-content; }
        .input-box { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; }
        input[type="number"] { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: #f9f9fb; font-weight: 600; }
        .execute-btn { width: 100%; padding: 16px; border-radius: 12px; background: var(--text); color: #fff; font-weight: 800; cursor: pointer; margin-top: 10px; border: none; }

        .main-display { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .res-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .res-card h3 { font-size: 11px; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #f2f2f7; padding-bottom: 8px; }
        .metric { margin-bottom: 15px; }
        .metric-info { display: flex; justify-content: space-between; font-weight: 700; font-size: 13px; margin-bottom: 5px; }
        .metric-bar { width: 100%; height: 6px; background: var(--bar-bg); border-radius: 10px; overflow: hidden; }
        .metric-fill { height: 100%; width: 0%; background: var(--accent); transition: 1s ease; }
        
        /* MAP TAB */
        #map-tab { padding: 0; max-width: 100%; position: relative; }
        #map { width: 100%; height: 100%; }
        
        .popup-header { font-weight: 900; color: var(--accent); font-size: 14px; margin-bottom: 5px; border-bottom: 1px solid #eee; }
        .popup-row { font-size: 13px; font-weight: 600; margin: 3px 0; }
        .popup-time { font-size: 10px; color: #ff3b30; font-weight: 800; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-logo">MDL SYSTEM</div>
        <input type="text" id="user" class="auth-input" placeholder="root">
        <input type="password" id="pass" class="auth-input" placeholder="MDL">
        <button class="auth-btn" onclick="login()">Войти</button>
    </div>

    <div id="main-app">
        <nav>
            <div class="nav-logo">MDL CORE</div>
            <div class="nav-link active" onclick="switchTab('compute', event)">Анализ параметров</div>
            <div class="nav-link" onclick="switchTab('map', event)">Карта станций РК (Live API)</div>
        </nav>

        <div id="compute-tab" class="tab-content active">
            <div class="sidebar">
                <h1>MDL CORE</h1>
                <p>Unified Forecasting Model v1.1</p>
                <div class="input-box"><label>CAPE</label><input type="number" id="cape" value="0"></div>
                <div class="input-box"><label>LI</label><input type="number" id="li" value="0"></div>
                <div class="input-box"><label>Shear 0-6km</label><input type="number" id="shear" value="0"></div>
                <div class="input-box"><label>SRH 0-3km</label><input type="number" id="srh" value="0"></div>
                <div class="input-box"><label>RH %</label><input type="number" id="rh" value="0"></div>
                <div class="input-box"><label>DPD °C</label><input type="number" id="dpd" value="0"></div>
                <div class="input-box"><label>Vorticity</label><input type="number" id="vort" value="0"></div>
                <button class="execute-btn" onclick="runMDL()">Compute Model</button>
            </div>
            <div class="main-display">
                <div class="res-card">
                    <h3>Clouds & Rain</h3>
                    <div class="metric"><div class="metric-info"><span>Осадки</span><span id="p1">0%</span></div><div class="metric-bar"><div id="b1" class="metric-fill"></div></div></div>
                    <div class="metric"><div class="metric-info"><span>Грозы</span><span id="p6">0%</span></div><div class="metric-bar"><div id="b6" class="metric-fill"></div></div></div>
                </div>
                <div class="res-card">
                    <h3>Severe Weather</h3>
                    <div class="metric"><div class="metric-info"><span>Суперячейки</span><span id="p7">0%</span></div><div class="metric-bar"><div id="b7" class="metric-fill"></div></div></div>
                    <div class="metric"><div class="metric-info"><span>Торнадо</span><span id="p9">0%</span></div><div class="metric-bar"><div id="b9" class="metric-fill"></div></div></div>
                </div>
            </div>
        </div>

        <div id="map-tab" class="tab-content">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const rapidKey = "9dca0667f8mshefd7ced000ec35cp122183jsna9176740ddc7"; // ТВОЙ КЛЮЧ ИЗ ЗАПРОСА
        let map;

        function login() {
            if(document.getElementById('user').value === 'root' && document.getElementById('pass').value === 'MDL') {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                initMap();
            }
        }

        function switchTab(name, e) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(name + '-tab').classList.add('active');
            e.target.classList.add('active');
            if(name === 'map') setTimeout(() => map.invalidateSize(), 100);
        }

        async function fetchStationData(lat, lon) {
            const url = `https://meteostat.p.rapidapi.com/stations/nearby?lat=${lat}&lon=${lon}&limit=5`;
            const options = {
                method: 'GET',
                headers: { 'x-rapidapi-key': rapidKey, 'x-rapidapi-host': 'meteostat.p.rapidapi.com' }
            };

            try {
                const response = await fetch(url, options);
                const data = await response.json();
                if (data.data && data.data.length > 0) {
                    return data.data[0]; // Берем ближайшую станцию
                }
            } catch (error) { console.error(error); }
            return null;
        }

        async function getLiveWeather(stationId) {
            // Запрос последних данных для конкретной станции
            const url = `https://meteostat.p.rapidapi.com/stations/hourly?station=${stationId}&limit=1`;
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'x-rapidapi-key': rapidKey, 'x-rapidapi-host': 'meteostat.p.rapidapi.com' }
                });
                const result = await response.json();
                return result.data[0];
            } catch (e) { return null; }
        }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([48, 67], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            const cities = [
                {n: "Павлодар", lat: 52.28, lon: 76.96},
                {n: "Жезказган", lat: 47.78, lon: 67.76},
                {n: "Караганда", lat: 49.80, lon: 73.08},
                {n: "Атырау", lat: 47.11, lon: 51.91},
                {n: "Тараз", lat: 42.90, lon: 71.37},
                {n: "Усть-Каменогорск", lat: 49.95, lon: 82.61}
            ];

            cities.forEach(async city => {
                const station = await fetchStationData(city.lat, city.lon);
                if (station) {
                    const weather = await getLiveWeather(station.id);
                    const marker = L.marker([city.lat, city.lon]).addTo(map);
                    
                    let content = `<div class="popup-header">${city.n} (ID: ${station.id})</div>`;
                    if (weather) {
                        content += `
                            <div class="popup-row">Температура: ${weather.temp.toFixed(1)}°C</div>
                            <div class="popup-row">Давление: ${weather.pres ? weather.pres.toFixed(1) : '--'} hPa</div>
                            <div class="popup-row">Ветер: ${weather.wspd.toFixed(1)} м/с</div>
                            <div class="popup-row">Направление: ${weather.wdir}°</div>
                            <span class="popup-time">Обновлено (UTC): ${weather.time}</span>
                        `;
                    } else {
                        content += `<div>Данные временно недоступны</div>`;
                    }
                    marker.bindPopup(content);
                }
            });
        }

        // Твоя логика MDL (без изменений)
        function runMDL() {
            const cape = parseFloat(document.getElementById('cape').value) || 0;

            alert("Расчет выполнен по модели MDL v1.1");
        }
    </script>
</body>
</html>
